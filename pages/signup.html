<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../assets/img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="../assets/styles/style.css">
    <link rel="stylesheet" href="../assets/styles/signup.css">

    <!-- GOOGLE FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,500;6..12,700&display=swap"
        rel="stylesheet">

    <!-- ICONS -->
    <script src="https://kit.fontawesome.com/e2bd8765fe.js" crossorigin="anonymous"></script>
    
    <title>Synesthesia Vision</title>
</head>
<body>
    <div class="left">

        <img src="../assets/img/logo-signup.png" width="320px">

        <form action="">
            <label for="name">
                <span>Nome</span>
                <input type="text" name="name" id="name">
            </label>

            <label for="CPF">
                <span>CPF</span>
                <input type="text" name="CPF" id="CPF">
            </label>

            <label for="number">
                <span>Número de Celular</span>
                <input type="tel" name="number" id="number">
            </label>

            <label for="CEP">
                <span>CEP</span>
                <input type="text" name="CEP" id="CEP">
            </label>

            <label for="address">
                <span>Endereço</span>
                <input type="text" name="address" id="address">
            </label>

            <label for="email">
                <span>Email</span>
                <input type="email" name="email" id="email">
            </label>

            <label for="password">
                <span>Senha</span>
                <input type="password" name="password" id="password">
            </label>

            <button type="submit" class="btnSignUp">Cadastre-se</button>
        </form>
    </div>

    <div class="right"></div>
</body>
</html>
